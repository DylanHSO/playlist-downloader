<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist Downloader</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎵</text></svg>'>
  <link rel="stylesheet" href="style.css">
  <script>
    // Set theme before paint to avoid flash
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-text">
        <h1>&#127925; Playlist Downloader</h1>
        <p class="subtitle">Plak je nummers, zoek en download als MP3</p>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Wissel thema">&#127769;</button>
    </div>
  </header>

  <div class="container">
    <nav class="tabs" role="tablist">
      <button class="tab tab-active" data-tab="songs" role="tab">&#127925; Songs</button>
      <button class="tab" data-tab="channel" role="tab">&#128250; Kanaal</button>
      <button class="tab" data-tab="album" role="tab">&#128191; Album</button>
    </nav>

    <div id="tab-songs" class="tab-panel tab-panel-active">
      <section class="input-section">
        <label for="songList">
          Nummers &mdash; één per regel, bijv. <em>Taylor Swift - Shake It Off</em>
        </label>
        <textarea
          id="songList"
          placeholder="Taylor Swift - Shake It Off
Ed Sheeran - Shape of You
The Weeknd - Blinding Lights"
          rows="8"
          spellcheck="false"
        ></textarea>
        <div class="actions">
          <button id="searchBtn" class="btn btn-primary">&#128269; Zoek nummer(s)</button>
        </div>
      </section>
    </div>

    <div id="tab-channel" class="tab-panel">
      <section class="input-section">
        <label for="channelInput">
          Naam van een YouTube-kanaal &mdash; download alle video's van het kanaal
        </label>
        <div class="actions">
          <input
            id="channelInput"
            type="text"
            class="channel-input"
            placeholder="bijv. Volbeat - Topic"
            autocomplete="off"
          />
          <button id="channelSearchBtn" class="btn btn-primary">&#128269; Zoek kanaal</button>
        </div>
      </section>
    </div>

    <div id="tab-album" class="tab-panel">
      <section class="input-section">
        <label for="albumInput">
          Naam van een album &mdash; tracklist wordt opgehaald via Discogs en automatisch gezocht
        </label>
        <div class="actions">
          <input
            id="albumInput"
            type="text"
            class="channel-input"
            placeholder="bijv. Volbeat - Rewind, Replay, Rebound"
            autocomplete="off"
          />
          <button id="albumSearchBtn" class="btn btn-primary">&#128269; Zoek album</button>
        </div>
      </section>
    </div>

    <div id="statusBar" class="status-bar" hidden></div>

    <section id="channelPicker" class="channel-picker-section" hidden>
      <h2 class="picker-title">Kies een kanaal</h2>
      <div id="channelPickerList"></div>
    </section>

    <section id="albumPicker" class="channel-picker-section" hidden>
      <h2 class="picker-title">Kies een album</h2>
      <div id="albumPickerList"></div>
    </section>

    <section id="results" class="results-section" hidden>
      <div id="resultsBar" class="results-bar" hidden>
        <label class="select-all-label">
          <input type="checkbox" id="selectAllCheckbox" checked>
          <span>Alles</span>
        </label>
        <button id="downloadAllBtn" class="btn btn-success">&#8659; Download alles</button>
      </div>
      <div id="resultsList"></div>
    </section>

    <p class="footer-note">MP3&rsquo;s worden gedownload via je browser</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
